[env]
TERM = "tmux-256color"

[general]
live_config_reload = true

[terminal.shell]
program = "/usr/bin/zsh"

[window]
opacity = 1
decorations = "None"
option_as_alt = "Both"
startup_mode = "Maximized"

[scrolling]
history = 10000
multiplier = 3

[cursor]
blink_interval = 500

[cursor.style]
blinking = "Always"
shape = "Underline"

[font]
size = 10
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold   = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
